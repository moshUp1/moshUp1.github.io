<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Motion Morph - Viral Video Editor</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Subtle Particle Background Effect */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(50px);
            opacity: 0.4;
        }

        /* Header */
        header {
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Preview Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .preview-container {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 9 / 16;
            background: #111;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(0, 242, 255, 0.1);
            border: 1px solid var(--glass);
        }

        canvas#morphCanvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* UI Overlays */
        .ui-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            pointer-events: none;
        }

        .ui-overlay * {
            pointer-events: auto;
        }

        /* Controls */
        .controls-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px;
            margin-top: 10px;
            border: 1px solid var(--glass);
        }

        .slider-container {
            width: 100%;
            margin: 10px 0;
        }

        input[type=range] {
            width: 100%;
            appearance: none;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
        }

        .buttons-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: var(--glass);
            border: 1px solid var(--glass);
            color: white;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
            background: var(--primary);
            color: black;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            font-weight: bold;
            padding: 12px 24px;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
            z-index: 100;
            border: none;
            cursor: pointer;
        }

        /* Upload Area */
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
        }

        .upload-box {
            aspect-ratio: 1;
            border: 2px dashed var(--glass);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #888;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .upload-box img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* AI Processing Loader */
        #loader {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: var(--primary);
            position: absolute;
            top: 0;
            box-shadow: 0 0 15px var(--primary);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Typography */
        .label {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
            display: block;
        }

        .hidden { display: none; }

        /* Mobile specific adjustments */
        @media (max-height: 700px) {
            .preview-container { aspect-ratio: 1; }
            header { padding: 10px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>
        <h1>Morph AI</h1>
    </header>

    <main>
        <!-- Image Uploaders -->
        <div class="upload-grid">
            <div class="upload-box" id="drop-1" onclick="document.getElementById('file-1').click()">
                <span id="text-1">START FRAME</span>
                <input type="file" id="file-1" class="hidden" accept="image/*">
                <img id="img-1" class="hidden">
            </div>
            <div class="upload-box" id="drop-2" onclick="document.getElementById('file-2').click()">
                <span id="text-2">END FRAME</span>
                <input type="file" id="file-2" class="hidden" accept="image/*">
                <img id="img-2" class="hidden">
            </div>
        </div>

        <!-- Preview Canvas -->
        <div class="preview-container" id="previewArea">
            <canvas id="morphCanvas"></canvas>
            
            <div id="loader">
                <div class="scan-line"></div>
                <div class="spinner"></div>
                <p style="margin-top: 20px; font-weight: bold; letter-spacing: 1px;">AI ANALYZING VECTORS...</p>
            </div>

            <div class="ui-overlay">
                <div class="controls-card">
                    <span class="label">Interpolation Progress</span>
                    <div class="slider-container">
                        <input type="range" id="morphSlider" min="0" max="1" step="0.001" value="0">
                    </div>
                    <div class="buttons-row">
                        <button class="btn" id="playBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <button class="btn" id="downloadBtn" title="Download Frame">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        </button>
                        <select id="speedSelect" class="btn" style="background: transparent; border: 1px solid var(--glass);">
                            <option value="0.005">0.5x</option>
                            <option value="0.01" selected>1.0x</option>
                            <option value="0.02">2.0x</option>
                        </select>
                        <button class="btn" id="fullscreenBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <button class="fab" id="generateBtn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
    </button>

    <script>
        /**
         * AI MOTION MORPH ENGINE
         * A vanilla JS implementation of image interpolation with grid distortion simulation.
         */

        const canvas = document.getElementById('morphCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        
        const file1 = document.getElementById('file-1');
        const file2 = document.getElementById('file-2');
        const img1El = document.getElementById('img-1');
        const img2El = document.getElementById('img-2');
        const slider = document.getElementById('morphSlider');
        const playBtn = document.getElementById('playBtn');
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');

        let img1 = null;
        let img2 = null;
        let isPlaying = false;
        let progress = 0;
        let speed = 0.01;
        let animationId = null;

        // --- Initialization ---

        function init() {
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            initBackground();
            loadDefaultImages(); // Using placeholders initially
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth * window.devicePixelRatio;
            canvas.height = container.clientHeight * window.devicePixelRatio;
            
            bgCanvas.width = window.innerWidth / 4;
            bgCanvas.height = window.innerHeight / 4;
            
            render();
        }

        // --- Background Animation ---

        function initBackground() {
            function drawBg() {
                const time = Date.now() * 0.001;
                bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                const grad = bgCtx.createRadialGradient(
                    bgCanvas.width/2 + Math.sin(time) * 50, 
                    bgCanvas.height/2 + Math.cos(time) * 50, 
                    0, 
                    bgCanvas.width/2, bgCanvas.height/2, bgCanvas.width
                );
                grad.addColorStop(0, '#7000ff');
                grad.addColorStop(1, '#00f2ff');
                bgCtx.fillStyle = grad;
                bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                requestAnimationFrame(drawBg);
            }
            drawBg();
        }

        // --- Image Handling ---

        function handleFile(e, id) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    if (id === 1) {
                        img1 = img;
                        img1El.src = event.target.result;
                        img1El.classList.remove('hidden');
                        document.getElementById('text-1').classList.add('hidden');
                    } else {
                        img2 = img;
                        img2El.src = event.target.result;
                        img2El.classList.remove('hidden');
                        document.getElementById('text-2').classList.add('hidden');
                    }
                    render();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        file1.addEventListener('change', (e) => handleFile(e, 1));
        file2.addEventListener('change', (e) => handleFile(e, 2));

        function loadDefaultImages() {
            // Create colored placeholders for demo
            img1 = createPlaceholder('#1a1a1a', 'Frame A');
            img2 = createPlaceholder('#2a2a2a', 'Frame B');
            render();
        }

        function createPlaceholder(color, text) {
            const c = document.createElement('canvas');
            c.width = 1080; c.height = 1920;
            const x = c.getContext('2d');
            x.fillStyle = color;
            x.fillRect(0, 0, c.width, c.height);
            x.fillStyle = 'white';
            x.font = 'bold 80px Inter';
            x.textAlign = 'center';
            x.fillText(text, 540, 960);
            return c;
        }

        // --- The Morphing Engine ---

        /**
         * Simulates AI Morphing using "Grid Mesh Warp" approximation.
         * We draw slices of the images with varying scales and offsets.
         */
        function render() {
            if (!img1 || !img2) return;

            const t = parseFloat(slider.value);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Calculate responsive fill
            const scale = Math.max(canvas.width / img1.width, canvas.height / img1.height);
            const w = img1.width * scale;
            const h = img1.height * scale;
            const x = (canvas.width - w) / 2;
            const y = (canvas.height - h) / 2;

            ctx.save();
            
            // --- Effect: Directional Fluid Warp ---
            // We draw the images twice with different displacement patterns
            
            // Image 1: Fading Out & Expanding
            ctx.globalAlpha = 1 - t;
            const warp1 = 1 + (t * 0.15); // Slight expand
            drawWarped(img1, x, y, w, h, t, true);

            // Image 2: Fading In & Contracting
            ctx.globalAlpha = t;
            const warp2 = 1.15 - (t * 0.15); // Slight contract
            drawWarped(img2, x, y, w, h, (1-t), false);

            ctx.restore();
        }

        /**
         * Basic Mesh Warp simulation
         * Divides image into horizontal slices and offsets them based on time
         */
        function drawWarped(img, x, y, w, h, t, isExit) {
            const slices = 20;
            const sliceH = h / slices;
            const imgSliceH = img.height / slices;

            for (let i = 0; i < slices; i++) {
                // Calculate horizontal displacement based on a sine wave + interpolation progress
                const offset = Math.sin((i / slices) * Math.PI + (t * 2)) * (t * 60);
                const zoom = 1 + (t * 0.1);

                ctx.drawImage(
                    img,
                    0, i * imgSliceH, img.width, imgSliceH, // Source
                    x - (offset/2) - ((w * (zoom-1))/2), (y + i * sliceH) - ((h * (zoom-1))/2), w * zoom + offset, sliceH * zoom // Destination
                );
            }
        }

        // --- UI Interactions ---

        function togglePlay() {
            isPlaying = !isPlaying;
            playBtn.innerHTML = isPlaying ? 
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>' : 
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            
            if (isPlaying) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        function animate() {
            if (!isPlaying) return;
            
            progress += speed;
            if (progress > 1) progress = 0;
            
            slider.value = progress;
            render();
            
            animationId = requestAnimationFrame(animate);
        }

        slider.addEventListener('input', () => {
            progress = parseFloat(slider.value);
            render();
        });

        playBtn.addEventListener('click', togglePlay);

        document.getElementById('speedSelect').addEventListener('change', (e) => {
            speed = parseFloat(e.target.value);
        });

        generateBtn.addEventListener('click', () => {
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.display = 'none';
                progress = 0;
                if (!isPlaying) togglePlay();
            }, 2000);
        });

        // --- Utils ---

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `ai-morph-frame-${Math.floor(Date.now()/1000)}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.getElementById('previewArea').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Touch Interaction (Simple Pan simulation)
        let isDragging = false;
        canvas.addEventListener('touchstart', () => isDragging = true);
        canvas.addEventListener('touchend', () => isDragging = false);
        canvas.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const val = (touch.clientX - rect.left) / rect.width;
                slider.value = Math.max(0, Math.min(1, val));
                render();
            }
        });

        // Initialize everything
        init();

    </script>
</body>
</html>
