<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoshUp Web</title>
    <style>
        :root {
            --mosh-red: #ff3b30;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            color: white;
            user-select: none;
        }

        /* Full screen video canvas */
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Instruction Card */
        #welcomeCard {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #welcomeCard h2 { margin-top: 0; color: var(--mosh-red); }
        #welcomeCard p { font-size: 15px; line-height: 1.4; margin-bottom: 20px; }
        #welcomeCard button {
            background: #000; color: white; border: none;
            padding: 12px 25px; border-radius: 25px; font-weight: bold;
            cursor: pointer; width: 100%;
        }

        /* Bottom Controls */
        .controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        #moshBtn {
            width: 75px;
            height: 75px;
            background: white;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        #moshBtn:active {
            transform: scale(0.85);
            background: var(--mosh-red);
            border-color: white;
        }

        /* Status text */
        #status {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="status">Live Preview</div>
    
    <!-- Explanation Card -->
    <div id="welcomeCard">
        <h2>MoshUp JS</h2>
        <p>1. Aim at something.<br>
           2. <b>Hold</b> the white button to freeze the image.<br>
           3. <b>Move</b> your phone to smear the frozen pixels!</p>
        <button onclick="closeCard()">GOT IT</button>
    </div>

    <canvas id="mainCanvas"></canvas>

    <div class="controls">
        <div id="moshBtn"></div>
    </div>
</div>

<video id="v" playsinline style="display:none"></video>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const statusText = document.getElementById('status');
const moshBtn = document.getElementById('moshBtn');

let width, height;
let isMoshing = false;
let prevFrameData = null;
let moshBuffer = null; // The "frozen" image data

// Algorithm Settings
const blockSize = 12;  // Stability vs Detail
const searchSize = 10; // How far pixels can travel

async function init() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 640, height: 480 },
            audio: false
        });
        video.srcObject = stream;
        await video.play();
        
        width = video.videoWidth;
        height = video.videoHeight;
        canvas.width = width;
        canvas.height = height;
        
        // Prepare the buffer
        moshBuffer = ctx.createImageData(width, height);
        
        requestAnimationFrame(render);
    } catch (e) {
        alert("Camera error. Please ensure you are on HTTPS or a local server.");
    }
}

function closeCard() {
    document.getElementById('welcomeCard').style.display = 'none';
}

// Input Events
const startMosh = (e) => { 
    e.preventDefault(); 
    isMoshing = true; 
    statusText.innerText = "• MOSHING";
    statusText.style.color = "#ff3b30";
};
const stopMosh = () => { 
    isMoshing = false; 
    statusText.innerText = "Live Preview";
    statusText.style.color = "white";
};

moshBtn.addEventListener('mousedown', startMosh);
window.addEventListener('mouseup', stopMosh);
moshBtn.addEventListener('touchstart', startMosh);
window.addEventListener('touchend', stopMosh);

function render() {
    // 1. Draw live video to a temporary buffer to analyze it
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = width; tempCanvas.height = height;
    const tCtx = tempCanvas.getContext('2d');
    tCtx.drawImage(video, 0, 0);
    
    const currentFrame = tCtx.getImageData(0, 0, width, height);
    const curr = currentFrame.data;

    if (!isMoshing) {
        // Just show the live video
        ctx.putImageData(currentFrame, 0, 0);
        // Keep the "mosh image" ready for the moment we press the button
        moshBuffer.data.set(curr);
    } else {
        // CALCULATE MOTION
        if (prevFrameData) {
            const currentMosh = new Uint8ClampedArray(moshBuffer.data);
            
            for (let y = 0; y < height; y += blockSize) {
                for (let x = 0; x < width; x += blockSize) {
                    
                    let bestX = 0, bestY = 0;
                    let minDiff = 1000000;

                    // Reference point in the LIVE current frame
                    const idx = (y * width + x) * 4;
                    const r1 = curr[idx], g1 = curr[idx+1], b1 = curr[idx+2];

                    // Look for where this block moved from in the PREVIOUS live frame
                    for (let sy = -searchSize; sy <= searchSize; sy += 3) {
                        for (let sx = -searchSize; sx <= searchSize; sx += 3) {
                            const py = y + sy;
                            const px = x + sx;

                            if (px >= 0 && px < width && py >= 0 && py < height) {
                                const pIdx = (py * width + px) * 4;
                                const diff = Math.abs(r1 - prevFrameData[pIdx]) + 
                                             Math.abs(g1 - prevFrameData[pIdx+1]) + 
                                             Math.abs(b1 - prevFrameData[pIdx+2]);
                                if (diff < minDiff) {
                                    minDiff = diff;
                                    bestX = sx;
                                    bestY = sy;
                                }
                            }
                        }
                    }

                    // Apply motion to the frozen buffer
                    // threshold (30) prevents "shimmering" pixels when the camera is still
                    if (minDiff < 300) { 
                        for (let by = 0; by < blockSize; by++) {
                            for (let bx = 0; bx < blockSize; bx++) {
                                const ty = y + by;
                                const tx = x + bx;
                                if (tx >= width || ty >= height) continue;

                                const targetIdx = (ty * width + tx) * 4;
                                const sourceY = Math.min(height - 1, Math.max(0, ty + bestY));
                                const sourceX = Math.min(width - 1, Math.max(0, tx + bestX));
                                const sourceIdx = (sourceY * width + sourceX) * 4;

                                moshBuffer.data[targetIdx] = currentMosh[sourceIdx];
                                moshBuffer.data[targetIdx+1] = currentMosh[sourceIdx+1];
                                moshBuffer.data[targetIdx+2] = currentMosh[sourceIdx+2];
                            }
                        }
                    }
                }
            }
        }
        ctx.putImageData(moshBuffer, 0, 0);
    }

    // Save the live frame for the next comparison
    if (!prevFrameData) prevFrameData = new Uint8ClampedArray(curr.length);
    prevFrameData.set(curr);

    requestAnimationFrame(render);
}

init();
</script>
</body>
</html>
